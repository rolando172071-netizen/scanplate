<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>SCAN·PLATE — Inventario Industrial</title>
    <meta name="theme-color" content="#f59e0b" />
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #080a0d; --card: #0d1117; --border: #1f2937; --accent: #f59e0b; --text: #ddd6c8; --muted: #4b5563; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }
        input, button { font-family: 'Courier New', monospace; }
        input:focus { outline: 1px solid var(--accent); }
        button { cursor: pointer; transition: all 0.2s; }
        .spin { animation: spin 2s linear infinite; display: inline-block; }
        .pulse { animation: pulse 1.5s infinite; }
        .slide { animation: slideIn 0.3s ease; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes slideIn { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        .btn-accent { background: var(--accent); color:#000; border:none; font-weight:bold; }
        .btn-accent:disabled { opacity:0.5; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ========== ⚠️ SOLO CAMBIA ESTA LÍNEA ==========
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxjGCUU35c2G_rWmcudodip1Go1ZzehALQ7ZZuMZbSU3Eq_HTpp59XJB15wq6uVR1dM/exec"; // ← Pon aquí tu URL real

const STORAGE_KEY = "scanplate_final";

// Campos manuales (identificación)
const MANUAL_FIELDS = [
    { key: "codigo_sap", label: "Código SAP", placeholder: "Ej: SAP-001234" },
    { key: "funcion",    label: "Función del Equipo", placeholder: "Ej: Bomba de enfriamiento" },
    { key: "maquina",    label: "Máquina", placeholder: "Ej: Extrusora #3" },
    { key: "linea",      label: "Línea de Producción", placeholder: "Ej: Línea 1" },
];

// Campos de placa (se llenan automáticamente si se detectan)
const PLACA_FIELDS = [
    { key: "tipo_equipo",       label: "Tipo de Equipo", placeholder: "Motor / Servo / Sensor..." },
    { key: "marca",             label: "Marca", placeholder: "Ej: Siemens" },
    { key: "modelo",            label: "Modelo", placeholder: "Ej: 1LE0001" },
    { key: "numero_serie",      label: "N° Serie", placeholder: "Ej: A1B2C3D4" },
    { key: "potencia",          label: "Potencia (HP/kW)", placeholder: "Ej: 5.5 kW" },
    { key: "voltaje",           label: "Voltaje (V)", placeholder: "Ej: 220/380V" },
    { key: "amperaje",          label: "Amperaje (A)", placeholder: "Ej: 12.5 A" },
    { key: "rpm",               label: "RPM", placeholder: "Ej: 1750" },
    { key: "frecuencia",        label: "Frecuencia (Hz)", placeholder: "Ej: 60 Hz" },
    { key: "factor_potencia",   label: "Factor de Potencia", placeholder: "Ej: 0.85" },
    { key: "proteccion_ip",     label: "Protección IP", placeholder: "Ej: IP55" },
    { key: "clase_aislamiento", label: "Clase Aislamiento", placeholder: "Ej: Clase F" },
    { key: "fabricacion",       label: "Año Fabricación", placeholder: "Ej: 2018" },
    { key: "otros",             label: "Otros Datos", placeholder: "Cualquier dato adicional..." },
];

function emptyM() { return MANUAL_FIELDS.reduce((a,f)=>({...a,[f.key]:""}),{}); }
function emptyP() { return PLACA_FIELDS.reduce((a,f)=>({...a,[f.key]:""}),{}); }

let S = {
    equipos: [],
    activeTab: "scan",
    loading: false,
    preview: null,
    ocrText: "",
    error: null,
    manualMode: false,
    editingRow: null,
    manualData: emptyM(),
    placaData: emptyP(),
    sync: {},
};

try { const s=localStorage.getItem(STORAGE_KEY); if(s) S.equipos=JSON.parse(s); } catch(e){}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(S.equipos)); }
function x(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function set(u) { Object.assign(S,u); render(); }

// ========== OCR con Tesseract ==========
let ocrWorker = null;
async function initOCR() {
    if (ocrWorker) return ocrWorker;
    ocrWorker = await Tesseract.createWorker('spa');
    return ocrWorker;
}

async function procesarImagen(file) {
    if (!file) return;
    set({ loading: true, error: null, ocrText: "" });
    const reader = new FileReader();
    reader.onload = async (e) => {
        S.preview = e.target.result;
        render();
        try {
            const worker = await initOCR();
            const { data: { text } } = await worker.recognize(file);
            S.ocrText = text.trim();
            set({ loading: false });
            if (S.ocrText) set({ manualMode: false }); // se activará al parsear
            else set({ error: "No se detectó texto.", manualMode: false });
        } catch (err) {
            set({ loading: false, error: "Error OCR: " + err.message });
        }
    };
    reader.readAsDataURL(file);
}

// ========== Función mágica para extraer datos del texto OCR ==========
function extraerDatosDeTexto() {
    const txt = S.ocrText;
    if (!txt) return alert("Primero toma una foto o carga una imagen.");
    const data = {};
    // Marca conocida
    const marcas = ['Siemens', 'ABB', 'Schneider', 'Allen-Bradley', 'Mitsubishi', 'Yaskawa', 'Festo', 'Rockwell', 'Omron'];
    for (const m of marcas) { if (txt.toLowerCase().includes(m.toLowerCase())) { data.marca = m; break; } }
    if (!data.marca) data.marca = txt.split(/[\r\n]+/)[0].trim();

    // Modelo tipo código Siemens
    let match = txt.match(/\b\d\w{2,4}\s[\w\d\-]{4,}\b/);
    if (match) data.modelo = match[1].trim();

    // Número de serie
    match = txt.match(/(?:S\/N|Serie|SN|Serial)[:\s]*([A-Z0-9\-]+)/i);
    if (!match) {
        const lines = txt.split(/[\r\n]+/);
        if (data.modelo) {
            const idx = lines.findIndex(l => l.includes(data.modelo));
            if (idx>=0 && idx+1<lines.length) match = [null, lines[idx+1].trim()];
        }
        if (!match) match = txt.match(/C-[A-Z0-9]+/); // patrón Siemens
    }
    if (match && match[1]) data.numero_serie = match[1];

    // MAC
    match = txt.match(/([0-9A-F]{2}-[0-9A-F]{2}-[0-9A-F]{2}-[0-9A-F]{2}-[0-9A-F]{2}-[0-9A-F]{2})/i);
    if (match) data.otros = (data.otros||"") + "MAC: " + match[1];

    // Voltaje
    match = txt.match(/(\d+[\.,]?\d*\s*V)/i);
    if (match) data.voltaje = match[1].replace(/\s/g,"");
    // Amperaje
    match = txt.match(/(\d+[\.,]?\d*\s*A)/i);
    if (match) data.amperaje = match[1].replace(/\s/g,"");
    // IP
    match = txt.match(/IP\s*(\d{2})/i);
    if (match) data.proteccion_ip = "IP" + match[1];
    // Temperatura
    match = txt.match(/(\d+°C[\s\.]*\.\.[\s\.]*\d+°C)/i);
    if (match) data.otros = (data.otros||"") + " | Temp: " + match[1];
    // Fabricación
    match = txt.match(/Made in\s+(\w+)/i);
    if (match) data.fabricacion = match[1];

    // Fusionar con lo existente
    const nuevo = { ...S.placaData };
    PLACA_FIELDS.forEach(f => { if (data[f.key] !== undefined && data[f.key] !== "") nuevo[f.key] = data[f.key]; });
    set({ placaData: nuevo, manualMode: true });
}

// ========== Envío a Google Sheets ==========
async function syncSheets(entry) {
    if (!SHEETS_URL || SHEETS_URL.includes("TU_ID")) return;
    S.sync[entry._id] = "syncing"; render();
    try {
        const payload = { fecha: entry._fecha };
        MANUAL_FIELDS.forEach(f => payload[f.key] = entry[f.key] || "");
        PLACA_FIELDS.forEach(f => payload[f.key] = entry[f.key] || "");
        const res = await fetch(SHEETS_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            const data = await res.json();
            S.sync[entry._id] = data.result === "ok" ? "ok" : "error";
        } else S.sync[entry._id] = "error";
    } catch(e) { S.sync[entry._id] = "error"; }
    render();
}

function guardar() {
    const entry = {
        ...S.manualData,
        ...S.placaData,
        _id: Date.now(),
        _fecha: new Date().toLocaleString("es-EC")
    };
    S.equipos.push(entry);
    save();
    syncSheets(entry);
    set({ manualData: emptyM(), placaData: emptyP(), preview: null, ocrText: "", error: null, manualMode: false, activeTab: "tabla" });
}

function updateEq(id, key, val) { const eq = S.equipos.find(e => e._id === id); if (eq) { eq[key] = val; save(); } }
function deleteEq(id) { if (confirm("¿Eliminar?")) { S.equipos = S.equipos.filter(e => e._id !== id); save(); set({}); } }

function exportExcel() {
    const wb = XLSX.utils.book_new();
    function rows(lista) {
        return lista.map((eq,i) => {
            const r = {"#": i+1, "Fecha": eq._fecha};
            MANUAL_FIELDS.forEach(f => r[f.label] = eq[f.key] || "");
            PLACA_FIELDS.forEach(f => r[f.label] = eq[f.key] || "");
            return r;
        });
    }
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows(S.equipos)), "Inventario");
    XLSX.writeFile(wb, "inventario_placas.xlsx");
}

// ========== Interfaz ==========
function field(label) { return `<div style="color:var(--muted);font-size:9px;letter-spacing:1px;margin-bottom:4px;">${label}</div>`; }
function inp2(key, val, ph, fn) {
    return `<input value="${x(val)}" placeholder="${ph}" oninput="${fn}" style="background:#080a0d;border:1px solid var(--border);color:var(--text);padding:9px;font-size:12px;width:100%;border-radius:2px;" />`;
}

function scanTab() {
    return `<div style="padding:16px;">
    <div style="color:var(--accent);font-size:9px;letter-spacing:3px;margin-bottom:10px;">① DATOS DE IDENTIFICACIÓN</div>
    ${MANUAL_FIELDS.map(f=>`<div style="margin-bottom:10px;">${field(f.label.toUpperCase())}${inp2(f.key,S.manualData[f.key]||"",f.placeholder,"S.manualData['"+f.key+"']=this.value")}</div>`).join("")}
    <div style="color:var(--accent);font-size:9px;letter-spacing:3px;margin:18px 0 10px;">② LECTURA DE PLACA</div>
    <input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="procesarImagen(this.files[0])" />
    <input type="file" id="gal" accept="image/*" style="display:none" onchange="procesarImagen(this.files[0])" />
    ${!S.loading ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <button onclick="document.getElementById('cam').click()" style="background:var(--card);border:2px solid var(--accent);color:var(--accent);padding:16px;font-size:11px;font-weight:bold;">📷 CÁMARA</button>
        <button onclick="document.getElementById('gal').click()" style="background:var(--card);border:2px solid var(--border);color:#9ca3af;padding:16px;font-size:11px;font-weight:bold;">🖼️ GALERÍA</button>
    </div>` : ''}
    ${S.loading ? `<div class="card" style="padding:20px;text-align:center;"><span class="spin">⚙</span><div class="pulse" style="color:var(--accent);">LEYENDO PLACA...</div></div>` :
      S.preview ? `<div class="card" style="padding:12px;text-align:center;margin-bottom:12px;"><img src="${S.preview}" style="max-height:130px;max-width:100%;border-radius:2px;" /><div style="color:#22c55e;margin-top:6px;font-size:11px;">✓ IMAGEN CARGADA</div></div>` : ''}
    ${S.ocrText ? `
    <div class="card" style="padding:10px;margin-bottom:10px;">
        <span style="color:var(--accent);">Texto detectado:</span>
        <div style="font-size:11px;margin:6px 0;">${x(S.ocrText)}</div>
        <button onclick="extraerDatosDeTexto()" style="background:var(--accent);color:#000;border:none;padding:8px;width:100%;font-size:11px;font-weight:bold;">🔍 EXTRAER DATOS AUTOMÁTICAMENTE</button>
    </div>` : ''}
    ${S.error ? `<div style="background:#2d0f0f;border:1px solid #ef4444;color:#ef4444;padding:10px;font-size:11px;margin-bottom:10px;">⚠ ${x(S.error)}</div>` : ''}
    <button onclick="set({manualMode:!S.manualMode})" style="background:transparent;border:1px solid ${S.manualMode?'var(--accent)':'var(--border)'};color:${S.manualMode?'var(--accent)':'#6b7280'};padding:8px;width:100%;margin-bottom:12px;font-size:10px;">
        ${S.manualMode ? '▲ OCULTAR CAMPOS DE PLACA' : '✎ LLENAR DATOS DE PLACA MANUALMENTE'}
    </button>
    ${S.manualMode ? `<div class="slide" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${PLACA_FIELDS.map(f=>`<div style="grid-column:${f.key==='otros'?'span 2':'span 1'}">${field(f.label.toUpperCase())}${inp2(f.key,S.placaData[f.key]||"",f.placeholder,"S.placaData['"+f.key+"']=this.value")}</div>`).join("")}</div>` : ''}
    <button onclick="guardar()" class="btn-accent" style="width:100%;padding:14px;margin-top:20px;font-size:13px;">+ GUARDAR EQUIPO</button>
    </div>`;
}

function tablaTab() {
    if (S.equipos.length === 0) return `<div style="text-align:center;padding:60px;color:var(--muted);">▤ SIN REGISTROS</div>`;
    return `<div style="padding:14px;display:flex;flex-direction:column;gap:10px;">
    ${S.equipos.map((eq,i)=>{
        const ed = S.editingRow === eq._id;
        const sy = S.sync[eq._id];
        const badge = sy==="ok"?`<span style="color:#22c55e;">⬡ OK</span>`:sy==="error"?`<span style="color:#ef4444;">⚠</span>`:sy==="syncing"?`<span class="spin" style="color:#60a5fa;">↻</span>`:`<span style="color:var(--muted);">◌</span>`;
        const fld = (f, c) => ed ? `<input value="${x(eq[f.key]||'')}" oninput="updateEq(${eq._id},'${f.key}',this.value)" style="background:#080a0d;border:1px solid var(--border);color:var(--text);padding:4px;font-size:11px;width:100%;" />`
                                 : `<div style="color:${eq[f.key]?(c||'var(--text)'):'var(--muted)'};">${x(eq[f.key]||'—')}</div>`;
        return `<div class="slide card" style="overflow:hidden;">
            <div style="background:#13181f;padding:10px;display:flex;justify-content:space-between;">
                <div>
                    <span style="color:var(--accent);font-size:10px;">#${String(i+1).padStart(3,'0')} </span>
                    <span style="color:#fff;font-size:12px;font-weight:bold;">${x(eq.tipo_equipo||'Equipo')} — ${x(eq.marca||'—')}</span>
                    ${eq.linea?`<span style="color:#22c55e;font-size:10px;margin-left:6px;">· ${x(eq.linea)}</span>`:''}
                </div>
                <div style="display:flex;gap:6px;align-items:center;">
                    ${badge}
                    <button onclick="set({editingRow:${ed?null:eq._id}})" style="background:transparent;border:1px solid var(--border);color:#9ca3af;padding:3px 8px;">✎</button>
                    <button onclick="deleteEq(${eq._id})" style="background:transparent;border:1px solid var(--border);color:#ef4444;padding:3px 8px;">✕</button>
                </div>
            </div>
            <div style="padding:10px;background:#090f09;border-bottom:1px solid var(--border);">
                <div style="color:#22c55e;font-size:9px;">IDENTIFICACIÓN</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">${MANUAL_FIELDS.map(f=>`<div>${field(f.label.toUpperCase())}${fld(f,'#22c55e')}</div>`).join("")}</div>
            </div>
            <div style="padding:10px;">
                <div style="color:var(--accent);font-size:9px;">DATOS DE PLACA</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">${PLACA_FIELDS.map(f=>`<div style="grid-column:${f.key==='otros'?'span 2':'span 1'}">${field(f.label.toUpperCase())}${fld(f)}</div>`).join("")}</div>
            </div>
            <div style="padding:5px 10px;border-top:1px solid var(--border);color:var(--muted);font-size:9px;">${x(eq._fecha)}</div>
        </div>`;
    }).join("")}
    <button onclick="exportExcel()" class="btn-accent" style="padding:14px;margin-top:4px;">↓ EXPORTAR A EXCEL</button>
    </div>`;
}

function render() {
    document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;background:#080a0d;">
        <div style="background:linear-gradient(180deg,#13181f,#0d1117);border-bottom:2px solid var(--accent);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div style="color:var(--accent);font-size:9px;letter-spacing:4px;">◈ INVENTARIO INDUSTRIAL</div>
                <div style="font-size:20px;font-weight:bold;color:#fff;letter-spacing:2px;">SCAN·PLATE</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <span style="background:#0d2210;border:1px solid #22c55e;border-radius:2px;padding:4px 8px;font-size:9px;color:#22c55e;">⬡ OCR + SHEETS</span>
                <button onclick="exportExcel()" ${S.equipos.length===0?"disabled":""}
                    class="btn-accent" style="padding:7px 14px;font-size:11px;">↓ EXCEL (${S.equipos.length})</button>
            </div>
        </div>
        <div style="display:flex;border-bottom:1px solid var(--border);">
            <button onclick="set({activeTab:'scan',editingRow:null})" style="flex:1;padding:11px;background:${S.activeTab==='scan'?'#0d1117':'transparent'};border:none;border-bottom:2px solid ${S.activeTab==='scan'?'var(--accent)':'transparent'};color:${S.activeTab==='scan'?'var(--accent)':'var(--muted)'};font-size:10px;letter-spacing:2px;font-weight:bold;">◈ NUEVO EQUIPO</button>
            <button onclick="set({activeTab:'tabla',editingRow:null})" style="flex:1;padding:11px;background:${S.activeTab==='tabla'?'#0d1117':'transparent'};border:none;border-bottom:2px solid ${S.activeTab==='tabla'?'var(--accent)':'transparent'};color:${S.activeTab==='tabla'?'var(--accent)':'var(--muted)'};font-size:10px;letter-spacing:2px;font-weight:bold;">▤ REGISTROS (${S.equipos.length})</button>
        </div>
        ${S.activeTab==='scan' ? scanTab() : tablaTab()}
    </div>`;
}

render();
</script>
</body>
</html>
